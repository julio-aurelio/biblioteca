<!DOCTYPE html>
<html>
<head>
    <title>Listar Livros</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Lista de Livros</h1>
    <ul>
        {% for livro in livros %}
            <li>
                {{ livro.titulo }} - {{ livro.autor }} ({{ livro.ano }})
                {% if livro.disponivel %}
                    [Disponível] 
                    <a href="{{ url_for('reservar', id=loop.index0) }}">Reservar</a>
                {% else %}
                    [Reservado por {{ livro.aluno }} ({{ livro.turma }})] 
                    <a href="{{ url_for('liberar', id=loop.index0) }}">Liberar</a>
                {% endif %}
                <a href="{{ url_for('excluir', id=loop.index0) }}">Excluir</a>
            </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('index') }}">Voltar</a>
</body>
</html>
